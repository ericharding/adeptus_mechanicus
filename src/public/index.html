<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adeptus Mechanicus</title>
</head>
<body>
  <h1>Adeptus Mechanicus</h1>
  <div id="app"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module">
    const socket = io();

    socket.on("connect", () => {
      console.log("connected", socket.id);
    });

    socket.on("message", (msg) => {
      console.log("server message:", msg);
    });

    // Example: send a ping on load
    socket.emit("message", { type: "ping", payload: "hello" });
  </script>
</body>
</html>
